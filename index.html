<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CryptoWatch — BTC Live</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #05050f; color: #e0e0e0; font-family: 'Courier New', Consolas, monospace; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #1a1a2e; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ── helpers ──────────────────────────────────────────────
    function generateMockHistory(base, count = 30) {
      const prices = [];
      let p = base * (0.85 + Math.random() * 0.1);
      for (let i = 0; i < count; i++) {
        p = p * (1 + (Math.random() - 0.48) * 0.04);
        prices.push(parseFloat(p.toFixed(2)));
      }
      prices.push(base);
      return prices;
    }

    function calcRSI(prices, period = 14) {
      if (prices.length < period + 1) return 50;
      let gains = 0, losses = 0;
      for (let i = prices.length - period; i < prices.length; i++) {
        const diff = prices[i] - prices[i - 1];
        if (diff > 0) gains += diff; else losses += Math.abs(diff);
      }
      const avg = gains / period, avgL = losses / period;
      if (avgL === 0) return 100;
      return parseFloat((100 - 100 / (1 + avg / avgL)).toFixed(1));
    }

    function calcMA(prices, period) {
      if (prices.length < period) return null;
      const s = prices.slice(-period);
      return parseFloat((s.reduce((a, b) => a + b, 0) / period).toFixed(2));
    }

    function calcBollinger(prices, period = 20) {
      if (prices.length < period) return null;
      const s = prices.slice(-period);
      const ma = s.reduce((a, b) => a + b, 0) / period;
      const std = Math.sqrt(s.reduce((sum, p) => sum + Math.pow(p - ma, 2), 0) / period);
      return { upper: ma + 2 * std, middle: ma, lower: ma - 2 * std };
    }

    function getSignal(rsi, price, ma7, ma25, boll) {
      let score = 0, reasons = [];
      if (rsi < 30)      { score += 2; reasons.push("RSI ต่ำกว่า 30 (Oversold)"); }
      else if (rsi > 70) { score -= 2; reasons.push("RSI สูงกว่า 70 (Overbought)"); }
      if (ma7 && ma25) {
        if (ma7 > ma25) { score += 1; reasons.push("MA7 > MA25 (Uptrend)"); }
        else            { score -= 1; reasons.push("MA7 < MA25 (Downtrend)"); }
      }
      if (boll) {
        if (price < boll.lower)  { score += 1; reasons.push("ราคาต่ำกว่า Bollinger Lower"); }
        else if (price > boll.upper) { score -= 1; reasons.push("ราคาสูงกว่า Bollinger Upper"); }
      }
      if (score >= 2)  return { signal: "ซื้อ (BUY)",   color: "#00FF88", emoji: "🟢", reasons };
      if (score <= -2) return { signal: "ขาย (SELL)",  color: "#FF4466", emoji: "🔴", reasons };
      return           { signal: "รอดู (HOLD)", color: "#FFB800", emoji: "🟡", reasons };
    }

    // ── App ──────────────────────────────────────────────────
    function App() {
      const [priceData, setPriceData] = useState(null);
      const [history,   setHistory]   = useState([]);
      const [orderBook, setOrderBook] = useState(null);
      const [lastUpdate, setLastUpdate] = useState(null);
      const [loading,   setLoading]   = useState(true);
      const [error,     setError]     = useState(null);
      const [tab,       setTab]       = useState("main");
      const [tfSignals, setTfSignals] = useState({});

      // ── fetch price ─────────────────────────────────────
      const fetchPrice = useCallback(async () => {
        try {
          const res  = await fetch("https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT");
          if (!res.ok) throw new Error();
          const data = await res.json();
          const price    = parseFloat(data.lastPrice);
          const change24h = parseFloat(data.priceChangePercent);
          setPriceData({ price, change24h });
          setHistory(prev => {
            const base = prev.length ? prev : generateMockHistory(price, 30);
            return [...base, price].slice(-80);
          });
          setLastUpdate(new Date());
          setError(null);
        } catch {
          setError("ใช้ข้อมูลจำลอง");
          const price = 67000 * (1 + (Math.random() - 0.48) * 0.02);
          setPriceData({ price, change24h: (Math.random() - 0.48) * 6 });
          setHistory(prev => prev.length ? [...prev, price].slice(-80) : generateMockHistory(price, 31));
          setLastUpdate(new Date());
        } finally { setLoading(false); }
      }, []);

      // ── fetch order book ─────────────────────────────────
      const fetchOrderBook = useCallback(async () => {
        try {
          const [dRes, tRes] = await Promise.all([
            fetch("https://api.binance.com/api/v3/depth?symbol=BTCUSDT&limit=20"),
            fetch("https://api.binance.com/api/v3/trades?symbol=BTCUSDT&limit=500"),
          ]);
          const depth  = await dRes.json();
          const trades = await tRes.json();

          const bidVol = depth.bids.reduce((s, [, q]) => s + parseFloat(q), 0);
          const askVol = depth.asks.reduce((s, [, q]) => s + parseFloat(q), 0);
          let buyVol = 0, sellVol = 0;
          trades.forEach(t => {
            const q = parseFloat(t.qty);
            if (t.isBuyerMaker) sellVol += q; else buyVol += q;
          });
          const total  = buyVol + sellVol;
          const obTotal = bidVol + askVol;
          setOrderBook({
            bidVol, askVol, buyVol, sellVol,
            buyPct:  total   > 0 ? (buyVol  / total)   * 100 : 50,
            sellPct: total   > 0 ? (sellVol / total)   * 100 : 50,
            bidPct:  obTotal > 0 ? (bidVol  / obTotal) * 100 : 50,
            askPct:  obTotal > 0 ? (askVol  / obTotal) * 100 : 50,
          });
        } catch {}
      }, []);

      const TIMEFRAMES = [
        { key:"5m",  label:"5 นาที" },
        { key:"15m", label:"15 นาที" },
        { key:"1h",  label:"1 ชม." },
        { key:"4h",  label:"4 ชม." },
        { key:"1d",  label:"1 วัน" },
      ];

      const fetchTimeframes = useCallback(async () => {
        const results = {};
        await Promise.all(TIMEFRAMES.map(async ({ key }) => {
          try {
            const res = await fetch(
              `https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=${key}&limit=50`
            );
            const klines = await res.json();
            // close prices
            const closes = klines.map(k => parseFloat(k[4]));
            const price  = closes[closes.length - 1];
            const rsi    = calcRSI(closes);
            const ma7    = calcMA(closes, 7);
            const ma25   = calcMA(closes, 25);
            const boll   = calcBollinger(closes);
            const { signal, color, emoji } = getSignal(rsi, price, ma7, ma25, boll);
            // candle direction
            const lastOpen  = parseFloat(klines[klines.length - 1][1]);
            const lastClose = parseFloat(klines[klines.length - 1][4]);
            const candleUp  = lastClose >= lastOpen;
            results[key] = { signal, color, emoji, rsi, candleUp };
          } catch {
            results[key] = { signal:"—", color:"#444", emoji:"⬜", rsi: null, candleUp: null };
          }
        }));
        setTfSignals(results);
      }, []);

      useEffect(() => {
        fetchPrice();
        fetchOrderBook();
        fetchTimeframes();
        const t1 = setInterval(fetchPrice,      3000);
        const t2 = setInterval(fetchOrderBook,  3000);
        const t3 = setInterval(fetchTimeframes, 30000);
        return () => { clearInterval(t1); clearInterval(t2); clearInterval(t3); };
      }, [fetchPrice, fetchOrderBook, fetchTimeframes]);

      // ── derived ──────────────────────────────────────────
      const rsi     = calcRSI(history);
      const ma7     = calcMA(history, 7);
      const ma25    = calcMA(history, 25);
      const boll    = calcBollinger(history);
      const { signal, color: sigColor, emoji, reasons } = getSignal(rsi, priceData?.price, ma7, ma25, boll);
      const isUp    = (priceData?.change24h || 0) >= 0;

      // ── chart ────────────────────────────────────────────
      const Chart = () => {
        if (history.length < 2) return null;
        const W = 600, H = 90;
        const min = Math.min(...history), max = Math.max(...history);
        const range = max - min || 1;
        const pts = history.map((p, i) => {
          const x = (i / (history.length - 1)) * W;
          const y = H - ((p - min) / range) * (H - 6) - 3;
          return `${x},${y}`;
        }).join(" ");
        const up = history[history.length - 1] >= history[0];
        const c  = up ? "#00FF88" : "#FF4466";
        return (
          <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display:"block", marginBottom:4 }}>
            <defs>
              <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stopColor={c} stopOpacity="0.18" />
                <stop offset="100%" stopColor={c} stopOpacity="0"    />
              </linearGradient>
            </defs>
            <polyline points={`${pts} ${W},${H} 0,${H}`} fill="url(#cg)" stroke="none" />
            <polyline points={pts} fill="none" stroke={c} strokeWidth="2" strokeLinejoin="round" />
          </svg>
        );
      };

      // ── verdict ──────────────────────────────────────────
      const Verdict = () => {
        if (!orderBook) return null;
        const { buyPct, sellPct, bidPct } = orderBook;
        const buyDom  = buyPct  > 55, sellDom = sellPct > 55, bidDom = bidPct > 55;
        let verdict, vColor, vEmoji;
        if      (buyDom && bidDom)    { verdict="แรงซื้อครอบงำตลาด — สัญญาณซื้อ";      vColor="#00FF88"; vEmoji="🟢"; }
        else if (sellDom && !bidDom)  { verdict="แรงขายครอบงำตลาด — สัญญาณขาย";       vColor="#FF4466"; vEmoji="🔴"; }
        else if (buyDom || bidDom)    { verdict="แรงซื้อมากกว่าเล็กน้อย — เฝ้าระวัง"; vColor="#88FF88"; vEmoji="🟡"; }
        else if (sellDom || !bidDom)  { verdict="แรงขายมากกว่าเล็กน้อย — เฝ้าระวัง"; vColor="#FF8888"; vEmoji="🟡"; }
        else                          { verdict="แรงซื้อ-ขายสมดุล — รอสัญญาณ";        vColor="#FFB800"; vEmoji="⚖️"; }
        return (
          <div style={{ background:`${vColor}10`, border:`1px solid ${vColor}33`, borderRadius:8, padding:"10px 14px", display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ fontSize:20 }}>{vEmoji}</span>
            <div>
              <div style={{ fontSize:10, color:"#555" }}>สรุปภาพรวม</div>
              <div style={{ fontSize:13, fontWeight:700, color:vColor }}>{verdict}</div>
            </div>
          </div>
        );
      };

      // ── loading ──────────────────────────────────────────
      if (loading) return (
        <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center" }}>
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:36, display:"inline-block", animation:"spin 1s linear infinite" }}>◌</div>
            <div style={{ color:"#F7931A", letterSpacing:3, fontSize:13, marginTop:12 }}>LOADING...</div>
          </div>
        </div>
      );

      // ── render ───────────────────────────────────────────
      return (
        <div style={{ minHeight:"100vh" }}>

          {/* Header */}
          <div style={{ background:"#0a0a1a", borderBottom:"1px solid #1a1a2e", padding:"14px 20px", display:"flex", justifyContent:"space-between", alignItems:"center", position:"sticky", top:0, zIndex:100 }}>
            <div>
              <div style={{ fontSize:18, fontWeight:900, letterSpacing:3 }}>
                ⬡ CRYPTO<span style={{ color:"#F7931A" }}>WATCH</span>
              </div>
              <div style={{ fontSize:11, color: error ? "#FFB800" : "#2a7a4a", marginTop:2 }}>
                {error ? `⚠ ${error}` : "● LIVE — อัปเดตทุก 3 วินาที"}
                {lastUpdate && `  ${lastUpdate.toLocaleTimeString("th-TH")}`}
              </div>
            </div>
            <button onClick={() => { fetchPrice(); fetchOrderBook(); }}
              style={{ background:"#F7931A11", border:"1px solid #F7931A44", color:"#F7931A", padding:"7px 14px", borderRadius:8, cursor:"pointer", fontFamily:"inherit", fontSize:12, fontWeight:700 }}>
              ↻ รีเฟรช
            </button>
          </div>

          {/* Tabs */}
          <div style={{ display:"flex", borderBottom:"1px solid #1a1a2e", padding:"0 20px" }}>
            {[["main","📊 ราคา & วิเคราะห์"],["guide","📖 คู่มือ"]].map(([k,l]) => (
              <button key={k} onClick={() => setTab(k)} style={{
                padding:"11px 18px", background:"transparent", border:"none",
                borderBottom: tab===k ? "2px solid #F7931A" : "2px solid transparent",
                color: tab===k ? "#F7931A" : "#555",
                cursor:"pointer", fontFamily:"inherit", fontSize:13, fontWeight:700,
              }}>{l}</button>
            ))}
          </div>

          <div style={{ padding:"20px", animation:"fadeIn 0.3s ease" }}>

            {/* ── MAIN TAB ── */}
            {tab === "main" && (
              <div style={{ maxWidth:620 }}>

                {/* Card: Price + Chart + Signal + Volume */}
                <div style={{ background:"rgba(247,147,26,0.05)", border:"1px solid #F7931A33", borderRadius:16, padding:20 }}>

                  {/* Coin header */}
                  <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:16 }}>
                    <div style={{ width:44, height:44, borderRadius:"50%", background:"#F7931A22", border:"2px solid #F7931A", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:900, color:"#F7931A" }}>BTC</div>
                    <div>
                      <div style={{ fontWeight:800, fontSize:16 }}>Bitcoin</div>
                      <div style={{ fontSize:11, color:"#555" }}>BTC / USDT</div>
                    </div>
                    <div style={{ marginLeft:"auto", padding:"4px 10px", borderRadius:20, fontSize:12, fontWeight:700,
                      background: isUp ? "#00FF8820" : "#FF446620",
                      color:      isUp ? "#00FF88"   : "#FF4466",
                      border:    `1px solid ${isUp ? "#00FF8844" : "#FF446644"}` }}>
                      {isUp ? "▲" : "▼"} {Math.abs(priceData?.change24h || 0).toFixed(2)}%
                    </div>
                  </div>

                  {/* Price */}
                  <div style={{ fontSize:36, fontWeight:900, color:"#fff", marginBottom:2 }}>
                    ${priceData?.price?.toLocaleString("en-US",{ minimumFractionDigits:2, maximumFractionDigits:2 })}
                  </div>
                  <div style={{ fontSize:12, color:"#444", marginBottom:14 }}>USD</div>

                  {/* Chart */}
                  <Chart />
                  <div style={{ fontSize:10, color:"#333", textAlign:"right", marginBottom:16 }}>
                    {history.length} จุดข้อมูล
                  </div>

                  {/* Divider */}
                  <div style={{ borderTop:"1px solid #F7931A22", marginBottom:16 }} />

                  {/* Signal */}
                  <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom: reasons.length ? 12 : 0 }}>
                    <span style={{ fontSize:28 }}>{emoji}</span>
                    <div>
                      <div style={{ fontSize:11, color:"#555" }}>สัญญาณรวม</div>
                      <div style={{ fontSize:20, fontWeight:900, color:sigColor }}>{signal}</div>
                    </div>
                  </div>

                  {/* Reasons */}
                  {reasons.length > 0 && (
                    <div style={{ marginBottom:0 }}>
                      <div style={{ fontSize:11, color:"#444", marginBottom:7, letterSpacing:1 }}>เหตุผล</div>
                      {reasons.map((r,i) => (
                        <div key={i} style={{ fontSize:12, color:"#aaa", marginBottom:5, paddingLeft:10, borderLeft:`2px solid ${sigColor}55` }}>{r}</div>
                      ))}
                    </div>
                  )}

                  {/* Divider */}
                  <div style={{ borderTop:"1px solid #1a1a2e", margin:"16px 0" }} />

                  {/* Timeframe Signals */}
                  <div style={{ fontSize:11, color:"#444", letterSpacing:1, marginBottom:12 }}>สัญญาณ Timeframe</div>
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:8, marginBottom:16 }}>
                    {TIMEFRAMES.map(({ key, label }) => {
                      const tf = tfSignals[key];
                      const c  = tf?.color || "#333";
                      return (
                        <div key={key} style={{ background:`${c}10`, border:`1px solid ${c}44`, borderRadius:10, padding:"10px 6px", textAlign:"center" }}>
                          <div style={{ fontSize:10, color:"#555", marginBottom:4 }}>{label}</div>
                          <div style={{ fontSize:18, marginBottom:4 }}>{tf?.emoji || "⏳"}</div>
                          <div style={{ fontSize:10, fontWeight:800, color:c, lineHeight:1.3 }}>
                            {tf ? (tf.signal === "ซื้อ (BUY)" ? "BUY" : tf.signal === "ขาย (SELL)" ? "SELL" : "HOLD") : "..."}
                          </div>
                          {tf?.rsi != null && (
                            <div style={{ fontSize:9, color:"#444", marginTop:3 }}>RSI {tf.rsi}</div>
                          )}
                        </div>
                      );
                    })}
                  </div>

                  {/* Timeframe Summary */}
                  {Object.keys(tfSignals).length === 5 && (() => {
                    const weights = { "5m":1, "15m":2, "1h":3, "4h":4, "1d":5 };
                    let buyScore = 0, sellScore = 0, totalWeight = 0;
                    let buyCount = 0, sellCount = 0;
                    TIMEFRAMES.forEach(({ key }) => {
                      const tf = tfSignals[key];
                      if (!tf || tf.signal === "—") return;
                      const w = weights[key];
                      totalWeight += w;
                      if (tf.signal === "ซื้อ (BUY)")  { buyScore  += w; buyCount++;  }
                      if (tf.signal === "ขาย (SELL)") { sellScore += w; sellCount++; }
                    });
                    const buyPct  = totalWeight > 0 ? (buyScore  / totalWeight) * 100 : 0;
                    const sellPct = totalWeight > 0 ? (sellScore / totalWeight) * 100 : 0;

                    let verdict, vColor, vEmoji, vDesc;
                    if      (buyCount >= 4 && buyPct >= 60)  { verdict="STRONG BUY";  vColor="#00FF88"; vEmoji="🚀"; vDesc=`${buyCount}/5 timeframe เป็น BUY (weighted ${buyPct.toFixed(0)}%)`; }
                    else if (buyCount >= 3 && buyPct >= 45)  { verdict="BUY";         vColor="#44DD88"; vEmoji="🟢"; vDesc=`${buyCount}/5 timeframe เป็น BUY (weighted ${buyPct.toFixed(0)}%)`; }
                    else if (sellCount >= 4 && sellPct >= 60){ verdict="STRONG SELL"; vColor="#FF2244"; vEmoji="🔻"; vDesc=`${sellCount}/5 timeframe เป็น SELL (weighted ${sellPct.toFixed(0)}%)`; }
                    else if (sellCount >= 3 && sellPct >= 45){ verdict="SELL";        vColor="#FF4466"; vEmoji="🔴"; vDesc=`${sellCount}/5 timeframe เป็น SELL (weighted ${sellPct.toFixed(0)}%)`; }
                    else                                      { verdict="NEUTRAL";    vColor="#FFB800"; vEmoji="⚖️"; vDesc="สัญญาณยังไม่ชัดเจน — รอดูต่อ"; }

                    return (
                      <div style={{ background:`${vColor}12`, border:`2px solid ${vColor}55`, borderRadius:12, padding:"14px 16px", marginBottom:16 }}>
                        <div style={{ fontSize:10, color:"#555", marginBottom:6, letterSpacing:1 }}>สรุปทุก TIMEFRAME</div>
                        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
                          <span style={{ fontSize:28 }}>{vEmoji}</span>
                          <div style={{ fontSize:22, fontWeight:900, color:vColor }}>{verdict}</div>
                        </div>
                        <div style={{ fontSize:11, color:"#888", marginBottom:10 }}>{vDesc}</div>
                        {/* weighted bar */}
                        <div style={{ height:8, borderRadius:6, overflow:"hidden", display:"flex", marginBottom:4 }}>
                          <div style={{ width:`${buyPct}%`,  background:"linear-gradient(90deg,#00AA55,#00FF88)", transition:"width 0.5s ease" }} />
                          <div style={{ width:`${100-buyPct-sellPct}%`, background:"#2a2a3a" }} />
                          <div style={{ flex:1, background:"linear-gradient(90deg,#FF4466,#AA2233)" }} />
                        </div>
                        <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, color:"#555" }}>
                          <span>BUY {buyPct.toFixed(0)}%</span>
                          <span>น้ำหนัก: 5m=1 · 15m=2 · 1h=3 · 4h=4 · 1d=5</span>
                          <span>{sellPct.toFixed(0)}% SELL</span>
                        </div>
                      </div>
                    );
                  })()}

                  {/* Divider */}
                  <div style={{ borderTop:"1px solid #1a1a2e", margin:"16px 0" }} />

                  {/* Volume section */}
                  <div style={{ fontSize:11, color:"#444", letterSpacing:1, marginBottom:12 }}>ปริมาณซื้อ-ขาย (500 รายการล่าสุด)</div>

                  {orderBook ? (
                    <>
                      {/* Trade flow */}
                      <div style={{ marginBottom:14 }}>
                        <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, marginBottom:6 }}>
                          <span style={{ color:"#00FF88", fontWeight:700 }}>🟢 ซื้อ {orderBook.buyPct.toFixed(1)}%</span>
                          <span style={{ color:"#FF4466", fontWeight:700 }}>ขาย {orderBook.sellPct.toFixed(1)}% 🔴</span>
                        </div>
                        <div style={{ height:12, borderRadius:6, overflow:"hidden", display:"flex" }}>
                          <div style={{ width:`${orderBook.buyPct}%`, background:"linear-gradient(90deg,#00AA55,#00FF88)", transition:"width 0.5s ease" }} />
                          <div style={{ flex:1, background:"linear-gradient(90deg,#FF4466,#AA2233)" }} />
                        </div>
                        <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"#555", marginTop:4 }}>
                          <span>{orderBook.buyVol.toFixed(2)} BTC</span>
                          <span>{orderBook.sellVol.toFixed(2)} BTC</span>
                        </div>
                      </div>

                      {/* Order book pressure */}
                      <div style={{ marginBottom:14 }}>
                        <div style={{ fontSize:11, color:"#444", marginBottom:6 }}>แรงซื้อ-ขาย (Order Book)</div>
                        <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, marginBottom:6 }}>
                          <span style={{ color:"#00FF88", fontWeight:700 }}>🟢 Bid {orderBook.bidPct.toFixed(1)}%</span>
                          <span style={{ color:"#FF4466", fontWeight:700 }}>Ask {orderBook.askPct.toFixed(1)}% 🔴</span>
                        </div>
                        <div style={{ height:8, borderRadius:6, overflow:"hidden", display:"flex" }}>
                          <div style={{ width:`${orderBook.bidPct}%`, background:"#00FF8866", transition:"width 0.5s ease" }} />
                          <div style={{ flex:1, background:"#FF446655" }} />
                        </div>
                        <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"#555", marginTop:4 }}>
                          <span>{orderBook.bidVol.toFixed(2)} BTC</span>
                          <span>{orderBook.askVol.toFixed(2)} BTC</span>
                        </div>
                      </div>

                      <Verdict />
                      <div style={{ fontSize:10, color:"#333", marginTop:8, textAlign:"right" }}>● Real-time อัปเดตทุก 3 วินาที</div>
                    </>
                  ) : (
                    <div style={{ fontSize:12, color:"#333", textAlign:"center", padding:"12px 0", animation:"pulse 1.5s infinite" }}>
                      กำลังโหลดข้อมูล...
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* ── GUIDE TAB ── */}
            {tab === "guide" && (
              <div style={{ maxWidth:620, animation:"fadeIn 0.3s ease" }}>
                {[
                  { title:"📌 RSI คืออะไร?", body:"RSI (Relative Strength Index) บอกว่าตลาดซื้อมากเกินหรือขายมากเกิน\n• RSI < 30 = ขายมากเกิน (Oversold) → อาจเป็นโอกาสซื้อ\n• RSI > 70 = ซื้อมากเกิน (Overbought) → ระวังราคาจะลง\n• RSI 30–70 = ปกติ" },
                  { title:"📌 Moving Average (MA) คืออะไร?", body:"MA คือค่าเฉลี่ยราคาในช่วงเวลาที่ผ่านมา\n• MA7 = ค่าเฉลี่ย 7 ช่วง (ระยะสั้น)\n• MA25 = ค่าเฉลี่ย 25 ช่วง (ระยะกลาง)\n• MA7 ตัด MA25 ขึ้น → Golden Cross (ซื้อ)\n• MA7 ตัด MA25 ลง → Death Cross (ขาย)" },
                  { title:"📌 Bollinger Bands คืออะไร?", body:"แถบบนและล่างรอบราคา บอกช่วงความผันผวน\n• ราคาแตะแถบล่าง → อาจเด้งขึ้น\n• ราคาแตะแถบบน → อาจปรับลง\n• แถบแคบ = ตลาดนิ่ง | แถบกว้าง = ตลาดผันผวน" },
                  { title:"⚠️ คำเตือนสำคัญ", body:"• ไม่มี indicator ไหนถูก 100%\n• อย่าลงทุนเงินที่ไม่สามารถเสียได้\n• เรียนรู้และฝึกบน Testnet ก่อนใช้เงินจริง\n• ระวัง FOMO (กลัวตกรถ) และอารมณ์ขณะเทรด\n• การวิเคราะห์นี้เพื่อการศึกษาเท่านั้น" },
                ].map(({ title, body }) => (
                  <div key={title} style={{ background:"rgba(255,255,255,0.02)", border:"1px solid #1a1a2e", borderRadius:14, padding:20, marginBottom:12 }}>
                    <div style={{ fontWeight:800, fontSize:14, marginBottom:10 }}>{title}</div>
                    <div style={{ fontSize:13, lineHeight:2, color:"#888", whiteSpace:"pre-wrap" }}>{body}</div>
                  </div>
                ))}
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
